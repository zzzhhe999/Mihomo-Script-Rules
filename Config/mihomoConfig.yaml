    - "time.*.gov"
    - "time.*.edu.cn"
    - "time.*.apple.com"
    - "time-ios.apple.com"
    - time1.cloud.tencent.com
    - "ntp.*.com"
    - ntp.aliyun.com
    - pool.ntp.org
    - "*.ntp.org"
    - +.msftconnecttest.com
    - +.msftncsi.com
    - +.srv.nintendo.net
    - +.stun.playstation.net
    - +.xboxlive.com
    - +.ipv6.microsoft.com
    - "rule-set:fakeip_filter"
  default-nameserver:
    - 223.5.5.5
    - 1.12.12.12
  proxy-server-nameserver:
    - 223.5.5.5
    - 1.12.12.12
    - "https://dns.alidns.com/dns-query"
    - "https://doh.pub/dns-query"
  nameserver:
    - "https://dns.google/dns-query#Default"
    - "https://dns.cloudflare.com/dns-query#Default"
  direct-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  direct-nameserver-follow-policy: true
  nameserver-policy:
    "rule-set:private":
      - "https://dns.alidns.com/dns-query#Direct"
      - "https://doh.pub/dns-query#Direct"
