  write-to-system: false
  server: ntp.aliyun.com
  port: 123
  interval: 30
  dialer-proxy: DIRECT
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports:
        - 80
        - "8080-8880"
    TLS:
      ports:
        - 443
        - 8443
    QUIC:
      ports:
        - 443
        - 8443
  skip-domain:
    - +.mijia.com
    - +.push.apple.com
    - gs.apple.com
    - "gsp-ssl.ls.apple.com"
    - +.lan
    - +.local
dns:
  enable: true
  ipv6: true
  listen: ":1053"
  cache-algorithm: arc
  use-hosts: true
  use-system-hosts: false
  prefer-h3: false
  enhanced-mode: "fake-ip"
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - dns.msftncsi.com
    - www.msftncsi.com
    - www.msftconnecttest.com
