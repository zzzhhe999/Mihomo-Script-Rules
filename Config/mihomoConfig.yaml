mode: rule
mixed-port: 7890
allow-lan: true
ipv6: true
bind-address: "*"
unified-delay: true
tcp-concurrent: true
find-process-mode: strict
geodata-mode: false
external-controller: "127.0.0.1:9090"
external-ui: ui
external-ui-url: "https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip"
profile:
  store-selected: true
  store-fake-ip: true
