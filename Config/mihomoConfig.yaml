hosts:
  dns.alidns.com:
    - 223.5.5.5
    - 223.6.6.6
    - "2400:3200::1"
    - "2400:3200:baba::1"
  doh.pub:
    - 1.12.12.12
    - 120.53.53.53
  dns.cloudflare.com:
    - 1.1.1.1
    - 1.0.0.1
  dns.google:
    - 8.8.8.8
    - 8.8.4.4
    - "2001:4860:4860::8888"
    - "2001:4860:4860::8844"
  cn.bing.com: global.bing.com
ntp:
  enable: true
  write-to-system: false
  server: ntp.aliyun.com
  port: 123
  interval: 30
  dialer-proxy: DIRECT
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports:
        - 80
        - "8080-8880"
    TLS:
      ports:
        - 443
        - 8443
    QUIC:
      ports:
        - 443
        - 8443
  skip-domain:
    - +.mijia.com
    - +.push.apple.com
    - gs.apple.com
    - "gsp-ssl.ls.apple.com"
    - +.lan
    - +.local
dns:
  enable: true
  ipv6: true
  listen: ":1053"
  cache-algorithm: arc
  use-hosts: true
  use-system-hosts: false
  prefer-h3: false
  enhanced-mode: "fake-ip"
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - dns.msftncsi.com
    - www.msftncsi.com
    - www.msftconnecttest.com
    - connectivitycheck.gstatic.com
    - connectivitycheck.android.com
    - connectivitycheck.platform.hicloud.com
    - "time.*.com"
    - "time.*.gov"
    - "time.*.edu.cn"
    - "time.*.apple.com"
    - "time-ios.apple.com"
    - time1.cloud.tencent.com
    - "ntp.*.com"
    - ntp.aliyun.com
    - pool.ntp.org
    - "*.ntp.org"
    - +.msftconnecttest.com
    - +.msftncsi.com
    - +.srv.nintendo.net
    - +.stun.playstation.net
    - +.xboxlive.com
    - +.ipv6.microsoft.com
    - "rule-set:fakeip_filter"
  default-nameserver:
    - 223.5.5.5
    - 1.12.12.12
  proxy-server-nameserver:
    - 223.5.5.5
    - 1.12.12.12
    - "https://dns.alidns.com/dns-query"
    - "https://doh.pub/dns-query"
  nameserver:
    - "https://dns.google/dns-query#默认代理"
    - "https://dns.cloudflare.com/dns-query#默认代理"
  direct-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  direct-nameserver-follow-policy: true
  nameserver-policy:
    "rule-set:private":
      - "https://dns.alidns.com/dns-query#直连"
      - "https://doh.pub/dns-query#直连"
    "rule-set:cn":
      - "https://dns.alidns.com/dns-query#直连"
      - "https://doh.pub/dns-query#直连"
    "rule-set:cn_additional":
      - "https://dns.alidns.com/dns-query#直连"
      - "https://doh.pub/dns-query#直连"
    "rule-set:apple_cn":
      - "https://dns.alidns.com/dns-query#直连"
      - "https://doh.pub/dns-query#直连"
    "rule-set:cloudflare_cn":
      - "https://dns.alidns.com/dns-query#直连"
      - "https://doh.pub/dns-query#直连"
    "rule-set:games_cn":
      - "https://dns.alidns.com/dns-query#直连"
      - "https://doh.pub/dns-query#直连"
    "rule-set:nvidia_cn":
      - "https://dns.alidns.com/dns-query#直连"
      - "https://doh.pub/dns-query#直连"
    "rule-set:gfw":
      - "https://dns.google/dns-query#默认代理"
      - "https://dns.cloudflare.com/dns-query#默认代理"
rules:
  - "AND,((NETWORK,udp),(DST-PORT,443),(OR,((RULE-SET,cn_additional),(RULE-SET,cn_ip,no-resolve)))),直连"
  - "AND,((NETWORK,udp),(DST-PORT,443)),QUIC处理"
  - "DOMAIN-SUFFIX,mcdn.bilivideo.com,REJECT"
  - "DOMAIN-SUFFIX,mcdn.bilivideo.cn,REJECT"
  - "DOMAIN-KEYWORD,mcdn.bili,REJECT"
  - "RULE-SET,private,直连"
  - "RULE-SET,private_ip,直连,no-resolve"
